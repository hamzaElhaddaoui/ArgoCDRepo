apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-deployment
  namespace: portfolio-ns
  labels:
    app: portfolio-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-app
  template:
    metadata:
      labels:
        app: portfolio-app
    spec:
      containers:
      - name: portfolio-pod
        image: hamzaportfolio:37bd32884a31711661485b5e4a55362d320a3a36
        imagePullPolicy: IfNotPresent
      nodeSelector:
        node: home-applications